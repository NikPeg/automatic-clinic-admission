name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

# Don't let an in-progress deploy overlap a newer one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 "root@$DEPLOY_HOST" '
            set -e
            cd /var/www/clinic-intake
            git fetch --prune
            git reset --hard origin/main
            npm ci
            NEXT_PUBLIC_BASE_PATH=/clinic-intake npm run build
            systemctl restart clinic-intake
            echo "deployed $(git rev-parse --short HEAD)"
          '
